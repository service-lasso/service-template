name: validate-template

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Package sample service (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package.ps1

      - name: Package sample service (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/package.sh

      - name: Run starter tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\test.ps1

      - name: Run starter tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x ./scripts/test.sh ./scripts/package.sh && ./scripts/test.sh

      - name: Assert packaged artifact exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path .\dist\echo-service-win32.zip)) {
            throw 'Expected Windows release archive missing'
          }

      - name: Assert packaged artifact exists (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: test -f ./dist/echo-service-linux.tar.gz

      - name: Assert packaged artifact exists (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: test -f ./dist/echo-service-darwin.tar.gz

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-template-${{ runner.os }}
          path: dist/*
